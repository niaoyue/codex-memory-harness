name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  project-verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run project verification
        shell: pwsh
        run: python -X utf8 scripts\verify_project.py
